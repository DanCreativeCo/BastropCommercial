name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this pull request for the Bastrop Commercial Real Estate
            static site (plain HTML/CSS/JS, no build step). Focus on:
            - Correctness bugs and broken links between pages/assets
            - Accessibility (alt text, heading order, color contrast)
            - Responsive layout and the inline-style/CSS conventions used here
            - SEO basics (titles, meta descriptions)
            Keep findings high-signal; skip nitpicks.
          claude_args: "--max-turns 5"
